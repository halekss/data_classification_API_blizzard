<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster WoW — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="logo">⚔</div>
        <div>
          <div class="title">Roster du compte</div>
          <div class="subtitle">World of Warcraft · Dashboard</div>
        </div>
      </div>
      <div class="header-right">
        <div class="refresh-info">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Chargement...</span>
        </div>
        <div class="refresh-info">Prochain refresh : <span id="next-refresh">—</span></div>
        <button class="btn-wow" onclick="loadData(true)">↺ Actualiser</button>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="overview">Vue d'ensemble</button>
      <button class="tab" data-tab="classes">Classes</button>
      <button class="tab" data-tab="roster">Roster</button>
      <button class="tab" data-tab="metiers">Métiers</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <div class="loading-screen" id="loading-screen">
      <div class="loading-icon">⚙</div>
      <div class="loading-text">Connexion à l'Explorateur de personnages...</div>
    </div>
  </div>
</div>

<script>
// @ts-nocheck
/* ══ CONFIG ══════════════════════════════════════════════════════════ */
const CONFIG = {
  githubUrl: 'https://raw.githubusercontent.com/halekss/data_classification_API_blizzard/main/data/mon_dataset_wow.csv',
  localUrl: './data/mon_dataset_wow.csv',
  refreshIntervalMinutes: 60,
  mode: 'github'
};

/* ══ CONSTANTES ══════════════════════════════════════════════════════ */
const CLASS_COLORS = {
  'Guerrier':'#C79C6E','Paladin':'#F58CBA','Chasseur':'#ABD473',
  'Voleur':'#FFF569','Prêtre':'#FFFFFF','Chevalier de la mort':'#C41F3B',
  'Chaman':'#0070DE','Mage':'#69CCF0','Démoniste':'#9482C9',
  'Moine':'#00FF96','Druide':'#FF7D0A','Chasseur de démons':'#A330C9',
  'Évocateur':'#33937F'
};

const CRAFT = ['Couture','Forge','Travail du cuir','Joaillerie','Ingénierie','Calligraphie','Enchantement','Alchimie'];
const HARVEST = ['Herboristerie','Minage','Dépeçage','Couture'];

/* Personnages crafteurs désignés (font le métier pour crafter, pas récolter) */
const CRAFTEURS = {'Daarken': 'Enchantement'};

/* ══ ÉTAT ════════════════════════════════════════════════════════════ */
let DATA = [];
let refreshTimer = null;
let countdownTimer = null;
let nextRefreshAt = null;
let activeTab = 'overview';
let rosterSearch = '';
let rosterClassFilter = '';

/* ══ PARSING CSV ═════════════════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    obj.Niveau = parseInt(obj.Niveau) || 0;
    obj.iLvl = parseInt(obj.iLvl) || 0;
    return obj;
  }).filter(r => r.Nom);
}

/* ══ CHARGEMENT ══════════════════════════════════════════════════════ */
function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

async function loadData(manual = false) {
  if (manual) setStatus('loading', 'Actualisation...');
  const url = CONFIG.mode === 'local' ? CONFIG.localUrl : CONFIG.githubUrl;
  try {
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    DATA = parseCSV(text);
    if (DATA.length === 0) throw new Error('CSV vide');
    setStatus('ok', DATA.length + ' personnages chargés');
    renderAll();
    scheduleRefresh();
  } catch (err) {
    setStatus('error', 'Erreur de chargement');
    if (DATA.length === 0) showError(url, err.message);
  }
}

function showError(url, msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-screen">
      <div class="error-title">Impossible de charger le CSV</div>
      <div class="error-msg">Vérifie que le dépôt est public et que GitHub Actions a tourné au moins une fois.<br><br>En local, lance <code>python -m http.server</code> depuis la racine du projet.</div>
      <div class="error-url">${url}</div>
      <div class="error-url" style="color:#CC4444">${msg}</div>
      <button class="btn-wow" style="margin-top:1rem;" onclick="loadData(true)">↺ Réessayer</button>
    </div>`;
}

/* ══ REFRESH AUTO ════════════════════════════════════════════════════ */
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  if (countdownTimer) clearInterval(countdownTimer);
  if (CONFIG.refreshIntervalMinutes <= 0) {
    document.getElementById('next-refresh').textContent = 'désactivé';
    return;
  }
  const ms = CONFIG.refreshIntervalMinutes * 60 * 1000;
  nextRefreshAt = Date.now() + ms;
  refreshTimer = setTimeout(() => loadData(), ms);
  countdownTimer = setInterval(() => {
    const r = Math.max(0, nextRefreshAt - Date.now());
    const m = Math.floor(r / 60000), s = Math.floor((r % 60000) / 1000);
    document.getElementById('next-refresh').textContent =
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

/* ══ RENDU GLOBAL ════════════════════════════════════════════════════ */
function renderAll() {
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <div id="tab-overview" class="tab-pane ${activeTab==='overview'?'active':''}"></div>
    <div id="tab-classes"  class="tab-pane ${activeTab==='classes'?'active':''}"></div>
    <div id="tab-roster"   class="tab-pane ${activeTab==='roster'?'active':''}"></div>
    <div id="tab-metiers"  class="tab-pane ${activeTab==='metiers'?'active':''}"></div>
    <div class="last-update">Dernière mise à jour : ${new Date().toLocaleString('fr-FR')}</div>
  `;
  renderOverview(); renderClasses(); renderRoster(); renderMetiers();
}

/* ══ OVERVIEW ════════════════════════════════════════════════════════ */
function renderOverview() {
  const el = document.getElementById('tab-overview');
  const total = DATA.length;
  const avgIlvl = (DATA.reduce((s,c) => s+c.iLvl, 0)/total).toFixed(0);
  const lvl90 = DATA.filter(c => c.Niveau===90).length;
  const races = new Set(DATA.map(c=>c.Race)).size;
  const champion = [...DATA].sort((a,b)=>b.iLvl-a.iLvl)[0];
  const top5 = [...DATA].sort((a,b)=>b.iLvl-a.iLvl).slice(0,5);
  const levelMap = {};
  DATA.forEach(c => { levelMap[c.Niveau]=(levelMap[c.Niveau]||0)+1; });
  const levels = Object.entries(levelMap).sort((a,b)=>b[0]-a[0]);
  const col = CLASS_COLORS[champion.Classe]||'#C8A84B';

  el.innerHTML = `
    <div class="stats-grid">
      ${statCard(total,'Personnages','dans le roster')}
      ${statCard(avgIlvl,'iLvl moyen','tous personnages')}
      ${statCard(lvl90,'Niveau 90','au niveau max')}
      ${statCard(races,'Races','représentées')}
    </div>
    <div class="section-title">🏆 Champion de la guilde</div>
    <div class="wow-frame champion-banner" style="margin-bottom:1.5rem">
      <div class="champion-avatar" style="color:${col};">${champion.Nom.slice(0,2).toUpperCase()}</div>
      <div>
        <div class="champion-name" style="color:${col};">${champion.Nom}</div>
        <div class="champion-meta">${champion.Classe} · ${champion.Race} · Niv.${champion.Niveau}</div>
        <div class="champion-meta" style="margin-top:3px;color:#666;">${champion['Métier 1']}${champion['Métier 2']!=='Aucun'?' / '+champion['Métier 2']:''}</div>
      </div>
      <div class="champion-ilvl">
        <div class="ilvl-big">${champion.iLvl}</div>
        <div class="ilvl-label">iLvl</div>
      </div>
    </div>
    <hr class="divider">
    <div class="section-title">⚡ Top 5 par iLvl</div>
    <div class="char-list">${top5.map((c,i)=>charRow(c,i+1,true)).join('')}</div>
    <hr class="divider">
    <div class="section-title">📊 Distribution par niveau</div>
    <div class="level-grid">${levels.map(([lvl,cnt])=>`
      <div class="level-card">
        <div class="level-num">${lvl}</div>
        <div class="level-count">${cnt} perso${cnt>1?'s':''}</div>
      </div>`).join('')}</div>
  `;
}

function statCard(val, label, sub) {
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${val}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

function charRow(c, rank, highlight) {
  const col = CLASS_COLORS[c.Classe]||'#C8A84B';
  return `<div class="char-row ${highlight?'highlight':''}">
    <div class="char-rank" style="color:${highlight?'#C8A84B':'#555'}">${rank}</div>
    <div class="char-dot" style="background:${col};"></div>
    <div class="char-name" style="color:${col};">${c.Nom}</div>
    <div class="char-meta">${c.Classe} · ${c.Race}</div>
    <div class="char-ilvl">${c.iLvl}</div>
  </div>`;
}

/* ══ CLASSES ═════════════════════════════════════════════════════════ */
function renderClasses() {
  const el = document.getElementById('tab-classes');
  const map = {};
  DATA.forEach(c => {
    if (!map[c.Classe]) map[c.Classe] = [];
    map[c.Classe].push(c.iLvl);
  });

  const avgs = Object.entries(map).map(([cl,ilvls]) => ({
    cl, avg: ilvls.reduce((s,v)=>s+v,0)/ilvls.length, count: ilvls.length
  })).sort((a,b) => b.avg-a.avg);

  const maxAvg = avgs[0].avg;
  const maxCount = Math.max(...avgs.map(x=>x.count));

  const avgBars = avgs.map((item,i) => {
    const col = CLASS_COLORS[item.cl]||'#C8A84B';
    const pct = (item.avg/maxAvg*100).toFixed(1);
    const isBest = i===0, isWorst = i===avgs.length-1;
    return `<div class="bar-row">
      <div class="bar-label">${item.cl}${isBest?'<span class="badge-top">TOP</span>':''}${isWorst?'<span class="badge-bot">BAS</span>':''}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col};"></div></div>
      <div class="bar-val">${item.avg.toFixed(0)}</div>
      <div class="bar-count">${item.count}p</div>
    </div>`;
  }).join('');

  const cntBars = [...avgs].sort((a,b)=>b.count-a.count).map(item => {
    const col = CLASS_COLORS[item.cl]||'#C8A84B';
    const pct = (item.count/maxCount*100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-label">${item.cl}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col};"></div></div>
      <div class="bar-val" style="color:#ccc;font-size:12px;">${item.count}</div>
    </div>`;
  }).join('');

  /* Effectif par race */
  const raceMap = {};
  DATA.forEach(c => { raceMap[c.Race]=(raceMap[c.Race]||0)+1; });
  const maxRace = Math.max(...Object.values(raceMap));
  const raceBars = Object.entries(raceMap).sort((a,b)=>b[1]-a[1]).map(([race,cnt]) => {
    const pct = (cnt/maxRace*100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-label">${race}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#7A5A8A;"></div></div>
      <div class="bar-val" style="color:#ccc;font-size:12px;">${cnt}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="section-title">⚔ iLvl moyen par classe</div>
    <div class="bars">${avgBars}</div>
    <hr class="divider">
    <div class="section-title">👥 Effectif par classe</div>
    <div class="bars">${cntBars}</div>
    <hr class="divider">
    <div class="section-title">🌍 Effectif par race</div>
    <div class="bars">${raceBars}</div>
  `;
}


/* ══ ROSTER ══════════════════════════════════════════════════════════ */
function renderRoster() {
  const el = document.getElementById('tab-roster');
  const classes = [...new Set(DATA.map(c=>c.Classe))].sort();
  el.innerHTML = `
    <input class="search-bar" id="roster-search" placeholder="Rechercher un personnage, une classe, une race..." value="${rosterSearch}">
    <div class="filter-row" id="class-filters">
      <button class="filter-btn ${rosterClassFilter === '' ? 'active' : ''}" data-class="">Toutes les classes</button>
      ${classes.map(cl=>`<button class="filter-btn ${rosterClassFilter===cl?'active':''}" data-class="${cl}" style="color:${CLASS_COLORS[cl]||'#888'};">${cl}</button>`).join('')}
    </div>
    <div id="roster-list"></div>
  `;
  document.getElementById('roster-search').addEventListener('input', e => {
    rosterSearch = e.target.value;
    updateRosterList();
  });
  document.getElementById('class-filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    rosterClassFilter = btn.dataset.class;
    renderRoster();
  });
  updateRosterList();
}

function updateRosterList() {
  const s = rosterSearch.toLowerCase();
  let list = [...DATA].sort((a,b)=>b.iLvl-a.iLvl);
  if (s) list = list.filter(c =>
    c.Nom.toLowerCase().includes(s)||c.Classe.toLowerCase().includes(s)||c.Race.toLowerCase().includes(s));
  if (rosterClassFilter) list = list.filter(c=>c.Classe===rosterClassFilter);
  const el = document.getElementById('roster-list');
  if (!el) return;
  if (list.length===0) { el.innerHTML='<div style="color:#555;font-size:13px;padding:12px;">Aucun résultat.</div>'; return; }
  el.innerHTML = `<div class="char-list">${list.map((c,i)=>{
    const col=CLASS_COLORS[c.Classe]||'#C8A84B';
    const hi=i<3&&!s&&!rosterClassFilter;
    return `<div class="char-row ${hi?'highlight':''}">
      <div class="char-rank" style="color:${hi?'#C8A84B':'#555'}">${i+1}</div>
      <div class="char-dot" style="background:${col};"></div>
      <div class="char-name" style="color:${col};">${c.Nom}</div>
      <div class="char-meta">${c.Classe} · ${c.Race} · Niv.${c.Niveau}</div>
      <div class="char-ilvl">${c.iLvl}</div>
    </div>`;
  }).join('')}</div>`;
}

/* ══ MÉTIERS ═════════════════════════════════════════════════════════ */
function renderMetiers() {
  const el = document.getElementById('tab-metiers');
  const craftMap = {};
  const harvestMap = {};
  const noMetier = [];

  DATA.forEach(c => {
    const m1 = c['Métier 1'], m2 = c['Métier 2'];
    if (m1==='Aucun' && m2==='Aucun') { noMetier.push(c); return; }

    [m1, m2].forEach(m => {
      if (!m || m==='Aucun') return;
      /* CRAFT — on distingue les crafteurs désignés */
      if (CRAFT.includes(m)) {
        if (!craftMap[m]) craftMap[m] = {crafteurs:[], recolteurs:[]};
        if (CRAFTEURS[c.Nom]) craftMap[m].crafteurs.push(c);
        else craftMap[m].recolteurs.push(c);
      }
      /* RÉCOLTE */
      if (HARVEST.includes(m)) {
        if (!harvestMap[m]) harvestMap[m] = new Set();
        harvestMap[m].add(c.Nom);
      }
    });
  });

  /* Craft HTML */
  const craftHtml = Object.entries(craftMap)
    .sort((a,b)=>(b[1].crafteurs.length+b[1].recolteurs.length)-(a[1].crafteurs.length+a[1].recolteurs.length))
    .map(([prof, {crafteurs, recolteurs}]) => {
      const total = crafteurs.length + recolteurs.length;
      const craftPills = crafteurs.map(c => {
        const col = CLASS_COLORS[c.Classe]||'#C8A84B';
        return `<span class="pill pill-crafteur" style="background:${col}22;color:${col};border-color:${col};" title="Crafteur principal">⭐ ${c.Nom}</span>`;
      }).join('');
      const recoltePills = recolteurs.map(c => {
        const col = CLASS_COLORS[c.Classe]||'#C8A84B';
        return `<span class="pill" style="background:${col}18;color:${col};border:1px solid ${col}33;">${c.Nom}</span>`;
      }).join('');
      return `<div class="craft-card">
        <div class="craft-title">${prof} <span style="color:#555;font-size:9px;font-weight:400;">(${total})</span></div>
        <div>${craftPills}${recoltePills}</div>
      </div>`;
    }).join('');

  /* Récolte HTML */
  const harvestHtml = HARVEST.filter(p=>harvestMap[p]).map(prof => {
    const cnt = harvestMap[prof].size;
    return `<div class="harvest-card">
      <div class="harvest-name">${prof}</div>
      <div class="harvest-val">${cnt}</div>
      <div class="harvest-sub">personnage${cnt>1?'s':''} pratiquant${cnt>1?'s':''}</div>
    </div>`;
  }).join('');

  /* Sans métier */
  const noMetierHtml = noMetier.length===0
    ? '<div style="color:#555;font-size:12px;">Aucun personnage sans métier.</div>'
    : noMetier.map(c=>{
        const col=CLASS_COLORS[c.Classe]||'#C8A84B';
        return `<span class="pill" style="background:${col}18;color:${col};border:1px solid ${col}33;margin:2px;">${c.Nom} <span style="color:#555;font-size:9px;">(${c.Classe})</span></span>`;
      }).join('');

  el.innerHTML = `
    <div class="section-title">🔨 Métiers de craft</div>
    <p style="font-size:11px;color:#666;margin-bottom:10px;font-family:'Cinzel',serif;">⭐ = crafteur principal désigné · les autres pratiquent ce métier en récolte secondaire</p>
    <div class="craft-grid">${craftHtml}</div>
    <hr class="divider">
    <div class="section-title">🌿 Métiers de récolte (dont Couture en secondaire)</div>
    <div class="harvest-grid">${harvestHtml}</div>
    <hr class="divider">
    <div class="section-title">📋 Sans métier</div>
    <div>${noMetierHtml}</div>
  `;
}

/* ══ NAVIGATION ══════════════════════════════════════════════════════ */
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  const pane = document.getElementById('tab-'+activeTab);
  if (pane) pane.classList.add('active');
});

/* ══ DÉMARRAGE ═══════════════════════════════════════════════════════ */
loadData();
</script>
</body>
</html>
